name: Build Windows App

on:
  workflow_dispatch:
    inputs:
      installer:
        description: "Build Inno Setup installer"
        required: false
        default: false
        type: boolean
      pointcloud:
        description: "Include Open3D point cloud runtime"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            MultiCamera.spec

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install -U pip wheel
          if ("${{ inputs.pointcloud }}" -eq "true") {
            python -m pip install -e ".[build-win,pointcloud]"
          } else {
            python -m pip install -e ".[build-win]"
          }

      - name: Build portable app
        shell: pwsh
        env:
          MULTICAMERA_WITH_OPEN3D: ${{ inputs.pointcloud && '1' || '' }}
        run: |
          pyinstaller --noconfirm MultiCamera.spec

      - name: Package portable ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force installer_output | Out-Null
          Compress-Archive -Path dist\MultiCamera\* -DestinationPath installer_output\MultiCamera_portable_x64.zip -Force

      - name: Install Inno Setup
        if: ${{ github.event_name == 'push' || inputs.installer }}
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        if: ${{ github.event_name == 'push' || inputs.installer }}
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          & $iscc packaging\windows\MultiCamera.iss

      - name: Upload installer
        if: ${{ github.event_name == 'push' || inputs.installer }}
        uses: actions/upload-artifact@v4
        with:
          name: MultiCamera-Windows-Installer
          path: installer_output\MultiCamera_Setup_*_x64.exe
          if-no-files-found: error

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: MultiCamera-Windows-Portable-ZIP
          path: installer_output\MultiCamera_portable_x64.zip
          if-no-files-found: error
